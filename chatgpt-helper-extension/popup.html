<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChatGPT Context Helper</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #ffffff;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        margin: 10px 0;
      }
      label {
        font-size: 13px;
        line-height: 1.4;
      }
      input, select {
        width: 110px;
        padding: 6px 8px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 13px;
      }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 9px 12px;
        border: 0;
        border-radius: 10px;
        background: #111827;
        color: white;
        font-size: 13px;
        cursor: pointer;
      }
      .ok {
        color: #047857;
        font-size: 12px;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>ChatGPT Context Helper</h1>
    <div class="hint">
      token 为页面可见内容估算值，不包含系统提示、隐藏上下文或内部 reasoning tokens。
    </div>

    <div class="row">
      <label for="warnThreshold">提醒阈值</label>
      <input id="warnThreshold" type="number" min="1000" step="1000" />
    </div>

    <div class="row">
      <label for="dangerThreshold">高风险阈值</label>
      <input id="dangerThreshold" type="number" min="2000" step="1000" />
    </div>

    <div class="row">
      <label for="copyMode">公式复制默认格式</label>
      <select id="copyMode">
        <option value="latex">LaTeX</option>
        <option value="markdown">Markdown</option>
      </select>
    </div>

    <div class="row">
      <label for="showPerMessage">显示每条消息 token</label>
      <select id="showPerMessage">
        <option value="true">显示</option>
        <option value="false">隐藏</option>
      </select>
    </div>

    <button id="saveBtn">保存设置</button>
    <div class="ok" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
